[package]
name = "pia-gui"
version = "0.1.0"
edition = "2021"
description = "PIA VPN GUI for NixOS — WireGuard backend via systemd"
license = "MIT"

[[bin]]
name = "pia-gui"
path = "src/main.rs"

[dependencies]
# GTK4 GUI
gtk4 = { version = "0.9", features = ["v4_10"] }
libadwaita = { version = "0.7", features = ["v1_4"] }
glib = "0.20"
gio = "0.20"

# Async runtime
tokio = { version = "1", features = ["full"] }

# D-Bus for systemd control
zbus = { version = "4", features = ["tokio"] }

# JSON parsing (PIA state files)
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# System tray
ksni = "0.2"

# Error handling
anyhow = "1"
thiserror = "1"

# Logging
tracing = "0.1"
tracing-subscriber = "0.3"

# IP info / external IP lookup
reqwest = { version = "0.12", features = ["json", "rustls-tls"], default-features = false }

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
strip = true
